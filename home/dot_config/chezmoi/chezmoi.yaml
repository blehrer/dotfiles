git:
  autoAdd: true
  autoCommit: true
  autoPush: true
edit:
  watch: true
diff:
  pager: bat
textconv:
  - pattern: "**/*.json"
    command: jq
    args:
      - "."
merge:
  command: nvim
  args:
    - -d
    - "-c let g:dst_buf=1 | let g:src_buf=2 | let g:tgt_buf=3"
    - "{{ .Destination }}"
    - "{{ .Source }}"
    - "{{ .Target }}"
